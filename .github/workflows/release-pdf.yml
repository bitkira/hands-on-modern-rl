name: Build PDF release asset

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-pdf-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release tag
        id: release
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          asset_name="hands-on-modern-rl-open-textbook-v${version}.pdf"
          en_asset_name="hands-on-modern-rl-open-textbook-en-v${version}.pdf"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "asset_name=${asset_name}" >> "$GITHUB_OUTPUT"
          echo "en_asset_name=${en_asset_name}" >> "$GITHUB_OUTPUT"
          echo "pdf_path=docs/.vitepress/dist/${asset_name}" >> "$GITHUB_OUTPUT"
          echo "en_pdf_path=docs/.vitepress/dist/${en_asset_name}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.release.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install LaTeX and image conversion tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-xetex \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-lang-chinese \
            fonts-noto-cjk \
            librsvg2-bin \
            imagemagick \
            ffmpeg \
            webp \
            poppler-utils \
            ghostscript
          echo "Font diagnostics:"
          fc-match "Noto Serif CJK SC"
          fc-match "Noto Sans CJK SC"
          fc-match "Noto Sans Mono CJK SC"

      - name: Setup Chrome for diagram rendering
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Build Chinese LaTeX book PDF
        run: node scripts/build-latex-book.mjs --limit 0
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          PDF_VERSION: ${{ steps.release.outputs.version }}
          PDF_BOOK_LIMIT: 0
          LATEX_BOOK_FILE_NAME: ${{ steps.release.outputs.asset_name }}
          PDF_OPTIMIZE: 1
          PDF_OPTIMIZE_PROFILE: default
          PUPPETEER_EXECUTABLE_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}

      - name: Upload Chinese LaTeX debug logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: chinese-latex-debug-${{ steps.release.outputs.tag }}
          path: |
            temp/latex-book/book.tex
            temp/latex-book/*.log
          if-no-files-found: ignore

      - name: Build English LaTeX book PDF
        run: node scripts/build-latex-book.mjs --limit 0
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          PDF_VERSION: ${{ steps.release.outputs.version }}
          PDF_LOCALE: en
          PDF_BOOK_LIMIT: 0
          LATEX_BOOK_FILE_NAME: ${{ steps.release.outputs.en_asset_name }}
          PDF_OPTIMIZE: 1
          PDF_OPTIMIZE_PROFILE: default
          PDF_AUTHORS: WalkingLabs; Sanbu
          PUPPETEER_EXECUTABLE_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}

      - name: Upload English LaTeX debug logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: english-latex-debug-${{ steps.release.outputs.tag }}
          path: |
            temp/latex-book/book.tex
            temp/latex-book/*.log
          if-no-files-found: ignore

      - name: Verify PDF assets
        run: |
          test -s "${PDF_PATH}"
          test -s "${EN_PDF_PATH}"
          echo "Chinese PDF:"
          pdfinfo "${PDF_PATH}" | sed -n '1,18p'
          echo "English PDF:"
          pdfinfo "${EN_PDF_PATH}" | sed -n '1,18p'
        env:
          PDF_PATH: ${{ steps.release.outputs.pdf_path }}
          EN_PDF_PATH: ${{ steps.release.outputs.en_pdf_path }}

      - name: Write release notes
        env:
          TAG_NAME: ${{ steps.release.outputs.tag }}
          PDF_ASSET_NAME: ${{ steps.release.outputs.asset_name }}
          EN_PDF_ASSET_NAME: ${{ steps.release.outputs.en_asset_name }}
        run: |
          pdf_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG_NAME}/${PDF_ASSET_NAME}"
          en_pdf_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG_NAME}/${EN_PDF_ASSET_NAME}"
          cat > release-notes.md <<EOF
          # Hands-On Modern RL: Open Textbook PDF Release ${TAG_NAME}

          This release publishes the book-form PDF edition of **Hands-On Modern RL** in both Chinese and English. The PDF is generated from the open course repository and typeset as a textbook edition for offline reading, classroom use, and citation-friendly distribution.

          本版本发布《Hands-On Modern RL：现代强化学习实战》的开放教材 PDF 版，并同时提供中文与英文两个版本。PDF 由开源课程仓库构建生成，采用书籍版排版，面向离线阅读、课堂教学与可引用分发，而不是网页打印导出。

          ## PDF Downloads / PDF 下载

          - [Chinese edition / 中文版 PDF](${pdf_url})
          - [English edition / 英文版 PDF](${en_pdf_url})

          ## About This Edition / 版本说明

          **English.** This edition covers a practice-first path through modern reinforcement learning: classic control, value and policy methods, deep RL, preference alignment, RLHF-style post-training, DPO, GRPO, RLVR, agentic RL, and multimodal reinforcement learning topics. The release also introduces a complete English PDF built from \`docs/en\`, aligned with the Chinese course structure.

          **中文。** 本版本围绕“从实践进入原理”的学习路线展开：从经典控制、价值方法与策略方法，到深度强化学习、偏好对齐、RLHF 式后训练、DPO、GRPO、RLVR、Agentic RL 与多模态强化学习等主题。本次发布同时提供基于 \`docs/en\` 构建的完整英文 PDF，并与中文课程结构保持对应。

          ## Textbook PDF Features / 教材版 PDF 特性

          - Book-style LaTeX typesetting, not a browser print export.
          - Dedicated front matter, chapter openings, page headers, footers, and page numbers.
          - Clickable table of contents and PDF bookmarks/outlines.
          - Rendered mathematical notation, diagrams, Mermaid figures, SVG assets, and selected animated assets converted for static PDF reading.
          - Optimized PDF structure and embedded fonts for release download, archiving, and offline study.
          - 中英文目录、章节编号与页面结构对齐，便于课堂引用和双语对照阅读。
          - 局部参考文献、脚注、代码块与常见 Markdown 结构经过面向 PDF 的整理。

          ## Citation / 引用

          If you use this textbook in teaching, reading groups, course notes, or derivative materials, please cite the repository and release version:

          如果你在课程教学、读书会、讲义或二次材料中使用本教材，请注明仓库与发布版本：

          \`\`\`text
          Hands-On Modern RL: Open Textbook, ${TAG_NAME}.
          WalkingLabs; Sanbu.
          https://github.com/${GITHUB_REPOSITORY}
          \`\`\`

          ## Release Assets / 资源说明

          GitHub automatically adds **Source code (zip)** and **Source code (tar.gz)** to every release. Those files are source archives, not the textbook PDFs. For reading, download:

          GitHub 会在每个 Release 中自动显示 **Source code (zip)** 和 **Source code (tar.gz)**。这两个文件是源码包，不是教材 PDF。阅读请下载：

          - \`${PDF_ASSET_NAME}\` for the Chinese edition / 中文版
          - \`${EN_PDF_ASSET_NAME}\` for the English edition / 英文版

          **Repository / 仓库**: https://github.com/${GITHUB_REPOSITORY}

          **Full Changelog / 完整变更记录**: https://github.com/${GITHUB_REPOSITORY}/commits/${TAG_NAME}
          EOF

      - name: Publish PDF release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: Hands-On Modern RL Open Textbook ${{ steps.release.outputs.tag }}
          body_path: release-notes.md
          files: |
            ${{ steps.release.outputs.pdf_path }}
            ${{ steps.release.outputs.en_pdf_path }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
